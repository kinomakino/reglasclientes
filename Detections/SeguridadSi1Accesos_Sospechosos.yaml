id: 5bc20ff2-6d0d-49c2-8926-ac78e44c25fe')]
name: SeguridadSi-1-Accesos Sospechosos
description: '🔎 Analiza accesos sospechosos a buzones y carpetas de otros usuarios, buscando:


  Más de un buzón accedido por el mismo usuario.


  Acceso a más de 5 carpetas en un buzón ajeno.


  Incluye datos como IPs de cliente, cliente de acceso, buzones accedidos, etc.'
severity: Medium
requiredDataConnectors:
- connectorId: AzureActiveDirectory
  dataTypes:
  - AuditLogs
- connectorId: Office365
  dataTypes:
  - OfficeActivity
queryFrequency: PT5H
queryPeriod: PT5H
triggerOperator: GreaterThan
triggerThreshold: 0
suppressionDuration: PT5H
suppressionEnabled: false
tactics: []
query: "let starttime = todatetime('{{StartTimeISO}}');\nlet endtime = todatetime('{{EndTimeISO}}');\nlet lookback = totimespan((endtime\
  \ - starttime) * 2);\n\n// Umbrales\nlet user_threshold = 1;        // Número de buzones distintos accedidos\nlet folder_threshold\
  \ = 5;      // Número de carpetas distintas accedidas\n\n// Consulta de OfficeActivity\nlet OfficeEvents = OfficeActivity\n\
  | where TimeGenerated between (ago(lookback)..starttime)\n| where Operation =~ \"MailItemsAccessed\"\n| where ResultStatus\
  \ =~ \"Succeeded\"\n| where tolower(MailboxOwnerUPN) != tolower(UserId)\n| join kind=rightanti (\n    OfficeActivity\n \
  \   | where TimeGenerated between (starttime..endtime)\n    | where Operation =~ \"MailItemsAccessed\"\n    | where ResultStatus\
  \ =~ \"Succeeded\"\n    | where tolower(MailboxOwnerUPN) != tolower(UserId)\n) on MailboxOwnerUPN, UserId\n| where isnotempty(Folders)\n\
  | mv-expand ParsedFolders = parse_json(Folders)\n| extend folders = tostring(ParsedFolders.Path)\n| extend ClientIP = iif(Client_IPAddress\
  \ startswith \"[\", extract(\"\\\\[([^\\\\]]*)\", 1, Client_IPAddress), Client_IPAddress)\n| summarize\n    StartTime =\
  \ max(TimeGenerated),\n    EndTime = min(TimeGenerated),\n    set_folders = make_set(folders, 100000),\n    set_ClientInfoString\
  \ = make_set(ClientInfoString, 100000),\n    set_ClientIP = make_set(ClientIP, 100000),\n    set_MailboxGuid = make_set(MailboxGuid,\
  \ 100000),\n    set_MailboxOwnerUPN = make_set(MailboxOwnerUPN, 100000)\n    by UserId\n| extend\n    folder_count = array_length(set_folders),\n\
  \    user_count = array_length(set_MailboxGuid)\n| where user_count > user_threshold or folder_count > folder_threshold\n\
  | extend Reason = case(\n    user_count > user_threshold and folder_count > folder_threshold, \"Both User and Folder Threshold\
  \ Exceeded\",\n    folder_count > folder_threshold, \"Folder Count Threshold Exceeded\",\n    \"User Threshold Exceeded\"\
  )\n| extend AccountName = tostring(split(UserId, \"@\")[0]), AccountUPNSuffix = tostring(split(UserId, \"@\")[1]);\n\n//\
  \ Consulta de EnrichedMicrosoft365AuditLogs\nlet EnrichedEvents = EnrichedMicrosoft365AuditLogs\n| where TimeGenerated between\
  \ (ago(lookback)..starttime)\n| where Operation =~ \"MailItemsAccessed\"\n| where ResultStatus =~ \"Succeeded\"\n| extend\
  \ MailboxOwnerUPN = tostring(parse_json(AdditionalProperties).MailboxOwnerUPN)\n| where tolower(MailboxOwnerUPN) != tolower(UserId)\n\
  | join kind=rightanti (\n    EnrichedMicrosoft365AuditLogs\n    | where TimeGenerated between (starttime..endtime)\n   \
  \ | where Operation =~ \"MailItemsAccessed\"\n    | where ResultStatus =~ \"Succeeded\"\n    | extend MailboxOwnerUPN =\
  \ tostring(parse_json(AdditionalProperties).MailboxOwnerUPN)\n    | where tolower(MailboxOwnerUPN) != tolower(UserId)\n\
  ) on MailboxOwnerUPN, UserId\n| where isnotempty(tostring(parse_json(AdditionalProperties).Folders))\n| mv-expand ParsedFolders\
  \ = parse_json(AdditionalProperties).Folders\n| extend folders = tostring(ParsedFolders.Path)\n| extend ClientIP = iif(ClientIp\
  \ startswith \"[\", extract(\"\\\\[([^\\\\]]*)\", 1, ClientIp), ClientIp)\n| extend ClientInfoString = tostring(parse_json(AdditionalProperties).ClientInfoString)\n\
  | extend MailboxGuid = tostring(parse_json(AdditionalProperties).MailboxGuid)\n| summarize\n    StartTime = max(TimeGenerated),\n\
  \    EndTime = min(TimeGenerated),\n    set_folders = make_set(folders, 100000),\n    set_ClientInfoString = make_set(ClientInfoString,\
  \ 100000),\n    set_ClientIP = make_set(ClientIP, 100000),\n    set_MailboxGuid = make_set(MailboxGuid, 100000),\n    set_MailboxOwnerUPN\
  \ = make_set(MailboxOwnerUPN, 100000)\n    by UserId\n| extend\n    folder_count = array_length(set_folders),\n    user_count\
  \ = array_length(set_MailboxGuid)\n| where user_count > user_threshold or folder_count > folder_threshold\n| extend Reason\
  \ = case(\n    user_count > user_threshold and folder_count > folder_threshold, \"Both User and Folder Threshold Exceeded\"\
  ,\n    folder_count > folder_threshold, \"Folder Count Threshold Exceeded\",\n    \"User Threshold Exceeded\")\n| extend\
  \ AccountName = tostring(split(UserId, \"@\")[0]), AccountUPNSuffix = tostring(split(UserId, \"@\")[1]);\n\n// Combinar\
  \ ambos resultados\nlet CombinedEvents = OfficeEvents\n| union EnrichedEvents\n| mv-expand ClientIP = set_ClientIP\n| extend\
  \ ClientIP = tostring(ClientIP)\n| summarize arg_min(StartTime, *) by UserId, ClientIP\n| extend AccountName = tostring(split(UserId,\
  \ \"@\")[0]), AccountUPNSuffix = tostring(split(UserId, \"@\")[1]);\n\nCombinedEvents\n| project UserId, user_count, folder_count,\
  \ set_MailboxOwnerUPN, set_ClientIP, set_ClientInfoString, set_folders, AccountName, AccountUPNSuffix, Reason\n| order by\
  \ user_count desc"
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: false
    reopenClosedIncident: false
    lookbackDuration: PT5H
    matchingMethod: AllEntities
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
kind: Scheduled
version: 1.0.0
